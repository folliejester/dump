<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dump Repository Index</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1f1a1a;
            --paper: #fffaf3;
            --accent: #ff6b35;
            --accent-2: #1f9d8f;
            --card: rgba(255, 255, 255, 0.82);
            --ring: rgba(31, 26, 26, 0.1);
            --shadow: 0 20px 40px rgba(31, 26, 26, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'Bricolage Grotesque', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 107, 53, 0.22) 0%, rgba(255, 107, 53, 0) 40%),
                radial-gradient(circle at 84% 16%, rgba(31, 157, 143, 0.22) 0%, rgba(31, 157, 143, 0) 45%),
                linear-gradient(145deg, #fff7ec 0%, #f8f3ea 100%);
            overflow-x: hidden;
        }

        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(rgba(31, 26, 26, 0.06) 0.6px, transparent 0.6px);
            background-size: 4px 4px;
            opacity: 0.3;
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 1120px;
            margin: 0 auto;
            padding: 30px 20px 48px;
        }

        .hero {
            padding: 36px 24px;
            border: 1px solid var(--ring);
            border-radius: 24px;
            background: var(--card);
            backdrop-filter: blur(4px);
            box-shadow: var(--shadow);
            transform: translateY(12px);
            opacity: 0;
            animation: lift-in 700ms ease forwards;
        }

        .kicker {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-size: 0.78rem;
            padding: 6px 10px;
            background: rgba(255, 107, 53, 0.12);
            color: #9c3d19;
            border-radius: 999px;
        }

        h1 {
            margin-top: 14px;
            font-size: clamp(2rem, 6vw, 4rem);
            line-height: 1.04;
            letter-spacing: -1px;
            max-width: 14ch;
        }

        .hero p {
            margin-top: 14px;
            max-width: 65ch;
            font-size: clamp(0.98rem, 2vw, 1.12rem);
            line-height: 1.5;
            color: rgba(31, 26, 26, 0.8);
        }

        .tagline {
            margin-top: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 0.84rem;
            letter-spacing: 0.2px;
            color: rgba(31, 26, 26, 0.68);
        }

        .toolbar {
            margin-top: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .search {
            width: min(460px, 100%);
            border: 1px solid var(--ring);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.85);
            transition: border-color 180ms ease, box-shadow 180ms ease;
        }

        .search:focus {
            border-color: rgba(31, 157, 143, 0.65);
            box-shadow: 0 0 0 4px rgba(31, 157, 143, 0.15);
        }

        .meta {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .sort-filter {
            border: 1px solid var(--ring);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 0.96rem;
            outline: none;
            background: rgba(255, 255, 255, 0.85);
            min-width: 190px;
        }

        .sort-filter:focus {
            border-color: rgba(31, 157, 143, 0.65);
            box-shadow: 0 0 0 4px rgba(31, 157, 143, 0.15);
        }

        .folder-filter {
            border: 1px solid var(--ring);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 0.96rem;
            outline: none;
            background: rgba(255, 255, 255, 0.85);
            min-width: 180px;
            flex: 1 1 240px;
        }

        .folder-filter:focus {
            border-color: rgba(255, 107, 53, 0.65);
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.15);
        }

        .repo-link {
            text-decoration: none;
            border: 1px solid rgba(31, 26, 26, 0.15);
            border-radius: 14px;
            padding: 11px 13px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.85);
            transition: transform 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
        }

        .repo-link:hover {
            transform: translateY(-2px);
            background: rgba(255, 107, 53, 0.14);
            box-shadow: 0 8px 18px rgba(31, 26, 26, 0.12);
        }

        .grid {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 16px;
        }

        .type-chips {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            border: 1px solid rgba(31, 26, 26, 0.12);
            background: rgba(255, 255, 255, 0.78);
            color: var(--ink);
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 0.78rem;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
        }

        .chip:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(31, 26, 26, 0.1);
        }

        .chip.active {
            background: rgba(255, 107, 53, 0.16);
            border-color: rgba(255, 107, 53, 0.38);
            color: #8d3717;
        }

        .card {
            grid-column: span 4;
            border-radius: 18px;
            border: 1px solid var(--ring);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 24px rgba(31, 26, 26, 0.08);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 210px;
            overflow: hidden;
            transform: translateY(12px);
            opacity: 0;
            animation: lift-in 480ms ease forwards;
        }

        .card.hidden {
            display: none;
        }

        .card-type {
            font-family: 'Space Mono', monospace;
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: fit-content;
            padding: 4px 9px;
            border-radius: 999px;
            background: rgba(31, 157, 143, 0.12);
            color: #0f5e56;
        }

        .card h2 {
            font-size: clamp(1.05rem, 2.6vw, 1.35rem);
            line-height: 1.25;
            word-break: break-word;
        }

        .project-card {
            grid-column: span 4;
            border-color: rgba(31, 157, 143, 0.22);
            background: rgba(255, 255, 255, 0.94);
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        .project-card:hover {
            border-color: rgba(31, 157, 143, 0.45);
            box-shadow: 0 12px 28px rgba(31, 26, 26, 0.12);
        }

        .project-card .card-type {
            background: rgba(255, 107, 53, 0.14);
            color: #8d3717;
        }

        .path {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            opacity: 0.8;
            min-width: 0;
        }

        .facts {
            font-family: 'Space Mono', monospace;
            font-size: 0.76rem;
            opacity: 0.75;
            min-width: 0;
        }

        .swipe-line {
            display: block;
            max-width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        .swipe-text {
            display: inline-block;
            min-width: max-content;
            will-change: transform;
        }

        .swipe-line.is-overflowing .swipe-text {
            animation: swipe-text var(--swipe-duration, 7s) ease-in-out 800ms infinite alternate;
        }

        @keyframes swipe-text {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(calc(-1 * var(--swipe-distance, 0px)));
            }
        }

        .actions {
            margin-top: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            text-decoration: none;
            border: 1px solid rgba(31, 26, 26, 0.15);
            border-radius: 12px;
            padding: 9px 11px;
            font: inherit;
            font-weight: 600;
            color: var(--ink);
            cursor: pointer;
            transition: transform 160ms ease, background-color 160ms ease, box-shadow 160ms ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(31, 26, 26, 0.12);
        }

        .btn.primary {
            background: var(--ink);
            color: #fff;
            border-color: var(--ink);
        }

        .btn.primary:hover {
            background: #000;
        }

        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            border: 1px dashed var(--ring);
            font-family: 'Space Mono', monospace;
            font-size: 0.88rem;
            display: none;
        }

        .project-modal {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            padding: 28px;
            background: rgba(255, 250, 243, 0.96);
            backdrop-filter: blur(8px);
        }

        .project-modal.open {
            display: block;
        }

        .project-modal-shell {
            height: 100%;
            max-width: 1120px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .project-modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(31, 26, 26, 0.12);
        }

        .project-modal-header h2 {
            font-size: clamp(1.8rem, 5vw, 3.4rem);
            line-height: 1.02;
        }

        .project-modal-meta {
            margin-top: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 0.82rem;
            color: rgba(31, 26, 26, 0.68);
        }

        .modal-close {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(31, 26, 26, 0.15);
            border-radius: 999px;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.86);
            font-size: 1.6rem;
            line-height: 1;
            cursor: pointer;
            transition: transform 160ms ease, background-color 160ms ease;
        }

        .modal-close:hover {
            transform: translateY(-1px);
            background: rgba(255, 107, 53, 0.14);
        }

        .modal-search {
            width: 100%;
            border: 1px solid var(--ring);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.88);
        }

        .modal-file-list {
            display: grid;
            gap: 10px;
            overflow-y: auto;
            min-height: 0;
            padding-right: 6px;
            scrollbar-color: rgba(31, 157, 143, 0.55) rgba(31, 26, 26, 0.07);
            scrollbar-width: thin;
        }

        .modal-file-list::-webkit-scrollbar {
            width: 10px;
        }

        .modal-file-list::-webkit-scrollbar-track {
            border-radius: 999px;
            background: rgba(31, 26, 26, 0.07);
        }

        .modal-file-list::-webkit-scrollbar-thumb {
            border-radius: 999px;
            background: rgba(31, 157, 143, 0.5);
        }

        .modal-file {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            align-items: center;
            gap: 14px;
            border: 1px solid rgba(31, 26, 26, 0.09);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.74);
            text-decoration: none;
            transition: background-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
        }

        .modal-file:hover {
            transform: translateY(-1px);
            background: rgba(31, 157, 143, 0.1);
            box-shadow: 0 8px 18px rgba(31, 26, 26, 0.08);
        }

        .modal-file-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'Space Mono', monospace;
            font-size: 0.88rem;
        }

        .modal-file-ext,
        .modal-file-size {
            font-family: 'Space Mono', monospace;
            font-size: 0.76rem;
            color: rgba(31, 26, 26, 0.62);
            text-transform: uppercase;
        }

        .modal-empty {
            padding: 16px;
            border: 1px dashed var(--ring);
            border-radius: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 0.88rem;
            color: rgba(31, 26, 26, 0.68);
        }

        footer {
            margin-top: 24px;
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            opacity: 0.75;
        }

        @keyframes lift-in {
            from {
                transform: translateY(12px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 980px) {
            .card {
                grid-column: span 6;
            }

            .project-card {
                grid-column: span 6;
            }
        }

        @media (max-width: 640px) {
            .wrap {
                padding: 18px 14px 34px;
            }

            .hero {
                padding: 24px 16px;
            }

            .card {
                grid-column: span 12;
            }

            .project-modal {
                padding: 18px 14px;
            }

            .modal-file {
                grid-template-columns: minmax(0, 1fr) auto;
            }

            .modal-file-size {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="wrap">
        <header class="hero">
            <span class="kicker">Dump Repo</span>
            <h1>My digital junk drawer, indexed.</h1>
            <p>Not a polished portfolio, just a live archive of things I make and collect. Browse by folder, type, or recency.</p>
            <p class="tagline">Not curated. Still useful.</p>
            <div class="toolbar">
                <input id="search" class="search" type="search" placeholder="Filter by file name, extension, or path" aria-label="Filter content">
                <select id="folderFilter" class="folder-filter" aria-label="Filter by folder">
                    <option value="all">All folders</option>
                </select>
                <select id="sortFilter" class="sort-filter" aria-label="Sort files">
                    <option value="path-asc">Sort: Path A-Z</option>
                    <option value="name-asc">Sort: Name A-Z</option>
                    <option value="date-desc">Sort: Newest First</option>
                    <option value="size-desc">Sort: Largest First</option>
                    <option value="type-asc">Sort: Type A-Z</option>
                </select>
                <a class="repo-link" href="https://github.com/folliejester/dump" target="_blank" rel="noopener noreferrer">GitHub Repo</a>
                <span id="count" class="meta"></span>
            </div>
            <div id="typeChips" class="type-chips"></div>
        </header>

        <main class="grid" id="cards"></main>
        <div id="status" class="status"></div>

    </div>

    <div id="projectModal" class="project-modal" role="dialog" aria-modal="true" aria-labelledby="projectModalTitle" aria-hidden="true">
        <div class="project-modal-shell">
            <header class="project-modal-header">
                <div>
                    <span class="kicker">Folder</span>
                    <h2 id="projectModalTitle">Folder</h2>
                    <p id="projectModalMeta" class="project-modal-meta"></p>
                </div>
                <button id="projectModalClose" class="modal-close" type="button" aria-label="Close folder list">&times;</button>
            </header>
            <input id="projectModalSearch" class="modal-search" type="search" placeholder="Filter this folder" aria-label="Filter folder files">
            <div id="projectModalFiles" class="modal-file-list"></div>
        </div>
    </div>

    <script>
        const search = document.getElementById('search');
        const cardsRoot = document.getElementById('cards');
        const count = document.getElementById('count');
        const status = document.getElementById('status');
        const folderFilter = document.getElementById('folderFilter');
        const sortFilter = document.getElementById('sortFilter');
        const typeChips = document.getElementById('typeChips');
        const projectModal = document.getElementById('projectModal');
        const projectModalTitle = document.getElementById('projectModalTitle');
        const projectModalMeta = document.getElementById('projectModalMeta');
        const projectModalFiles = document.getElementById('projectModalFiles');
        const projectModalSearch = document.getElementById('projectModalSearch');
        const projectModalClose = document.getElementById('projectModalClose');
        let cards = [];
        let loadedFiles = [];
        let cardItems = [];
        let activeProject = null;
        let selectedType = 'all';

        function formatBytes(bytes) {
            if (typeof bytes !== 'number' || Number.isNaN(bytes)) return 'unknown size';
            if (bytes < 1024) return `${bytes} B`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
            return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
        }

        function categoryFromExt(ext) {
            const map = {
                // Folder
                folder: 'Folder',
                        
                // Web / Frontend
                html: 'HTML',
                htm: 'HTML',
                css: 'CSS',
                scss: 'Sass',
                sass: 'Sass',
                less: 'Less',
                js: 'JavaScript',
                mjs: 'JavaScript Module',
                cjs: 'CommonJS',
                ts: 'TypeScript',
                jsx: 'React JSX',
                tsx: 'React TSX',
                vue: 'Vue',
                svelte: 'Svelte',
                        
                // Backend / General Code
                py: 'Python',
                java: 'Java',
                class: 'Java Bytecode',
                jar: 'Java Archive',
                c: 'C',
                h: 'C Header',
                cpp: 'C++',
                hpp: 'C++ Header',
                cs: 'C#',
                go: 'Go',
                rs: 'Rust',
                php: 'PHP',
                rb: 'Ruby',
                swift: 'Swift',
                kt: 'Kotlin',
                dart: 'Dart',
                scala: 'Scala',
                        
                // Shell / Scripts
                sh: 'Shell Script',
                bash: 'Bash Script',
                zsh: 'Zsh Script',
                fish: 'Fish Script',
                ps1: 'PowerShell',
                bat: 'Batch Script',
                cmd: 'Command Script',
                        
                // Data / Config
                json: 'JSON',
                jsonc: 'JSONC',
                yaml: 'YAML',
                yml: 'YAML',
                xml: 'XML',
                toml: 'TOML',
                ini: 'INI',
                conf: 'Config',
                config: 'Config',
                env: 'Environment',
                properties: 'Properties',
                        
                // Docs
                md: 'Markdown',
                txt: 'Text',
                rtf: 'Rich Text',
                pdf: 'PDF',
                doc: 'Word',
                docx: 'Word',
                odt: 'OpenDocument Text',
                xls: 'Excel',
                xlsx: 'Excel',
                ods: 'OpenDocument Spreadsheet',
                ppt: 'PowerPoint',
                pptx: 'PowerPoint',
                odp: 'OpenDocument Presentation',
                        
                // Images
                png: 'Image',
                jpg: 'Image',
                jpeg: 'Image',
                gif: 'Image',
                svg: 'Vector Image',
                webp: 'Image',
                bmp: 'Bitmap',
                tiff: 'TIFF',
                ico: 'Icon',
                avif: 'Image',
                heic: 'Image',
                        
                // Audio
                mp3: 'Audio',
                wav: 'Audio',
                ogg: 'Audio',
                flac: 'Audio',
                aac: 'Audio',
                m4a: 'Audio',
                        
                // Video
                mp4: 'Video',
                mkv: 'Video',
                avi: 'Video',
                mov: 'Video',
                webm: 'Video',
                flv: 'Video',
                        
                // Archives
                zip: 'Archive',
                rar: 'Archive',
                '7z': 'Archive',
                tar: 'Archive',
                gz: 'Gzip',
                bz2: 'Bzip2',
                xz: 'XZ',
                iso: 'Disk Image',
                        
                // Databases
                db: 'Database',
                sqlite: 'SQLite',
                sqlite3: 'SQLite',
                sql: 'SQL',
                        
                // Fonts
                ttf: 'Font',
                otf: 'Font',
                woff: 'Font',
                woff2: 'Font',
                        
                // Dev / Tooling
                dockerfile: 'Docker',
                makefile: 'Makefile',
                gradle: 'Gradle',
                npmignore: 'NPM Config',
                gitignore: 'Git Config',
                gitattributes: 'Git Config',
                lock: 'Lock File',
                        
                // Logs / Misc
                log: 'Log',
                tmp: 'Temp',
                bak: 'Backup',
                cache: 'Cache',
                dat: 'Data',
                bin: 'Binary',
                        
                // Special
                license: 'License',
                readme: 'Readme'
            };
            return map[ext] || 'File';
        }

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, (character) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[character]));
        }

        function swipeLine(value) {
            return `<span class="swipe-line"><span class="swipe-text">${escapeHtml(value)}</span></span>`;
        }

        function pathToHref(filePath) {
            return String(filePath || '').split('/').map((segment) => encodeURIComponent(segment)).join('/');
        }

        function getProjectFolder(file) {
            const filePath = file.path || '';
            if (!filePath.includes('/')) return 'root';
            return filePath.split('/')[0] || 'root';
        }

        function getTypeKeys(files) {
            return [...new Set(files.map((file) => ((file.ext || '').toLowerCase() || 'none')))].sort((a, b) => a.localeCompare(b));
        }

        function getProjectFileLabel(project, file) {
            const prefix = `${project.folder}/`;
            return file.path.startsWith(prefix) ? file.path.slice(prefix.length) : file.path;
        }

        function pickProjectEntry(files) {
            const sorted = [...files].sort((a, b) => a.path.localeCompare(b.path));
            const htmlFiles = sorted.filter((file) => ['html', 'htm'].includes((file.ext || '').toLowerCase()));
            const preferred = htmlFiles.find((file) => file.name.toLowerCase() === 'index.html');
            return preferred || htmlFiles[0] || sorted[0];
        }

        function groupFilesIntoCards(files) {
            const rootCards = [];
            const projectMap = new Map();

            files.forEach((file) => {
                const projectFolder = getProjectFolder(file);

                if (projectFolder === 'root') {
                    rootCards.push({
                        ...file,
                        kind: 'file',
                        files: [file],
                        typeKeys: [((file.ext || '').toLowerCase() || 'none')]
                    });
                    return;
                }

                if (!projectMap.has(projectFolder)) {
                    projectMap.set(projectFolder, {
                        kind: 'project',
                        name: projectFolder,
                        path: `${projectFolder}/`,
                        folder: projectFolder,
                        ext: 'folder',
                        size: 0,
                        files: []
                    });
                }

                const project = projectMap.get(projectFolder);
                project.files.push(file);
                project.size += file.size || 0;
            });

            const projectCards = [...projectMap.values()].map((project) => {
                const filesInProject = [...project.files].sort((a, b) => a.path.localeCompare(b.path));
                const entry = pickProjectEntry(filesInProject);

                return {
                    ...project,
                    files: filesInProject,
                    entry,
                    typeKeys: getTypeKeys(filesInProject)
                };
            });

            return [...rootCards, ...projectCards];
        }

        function createCard(file, index) {
            if (file.kind === 'project') return createProjectCard(file, index);

            const article = document.createElement('article');
            article.className = 'card';
            article.style.animationDelay = `${Math.min(index * 45, 450)}ms`;

            const ext = (file.ext || '').toLowerCase();
            const category = categoryFromExt(ext || file.name.toLowerCase());
            const href = pathToHref(file.path);
            const folder = file.folder || 'root';
            const tags = `${file.name} ${file.path} ${folder} ${ext} ${category}`.toLowerCase();
            const typeKey = ext || 'none';

            article.dataset.tags = tags;
            article.dataset.folder = folder;
            article.dataset.type = typeKey;
            article.dataset.types = typeKey;
            article.innerHTML = `
                <span class="card-type">${escapeHtml(category)}</span>
                <h2>${swipeLine(file.name)}</h2>
                <p class="path">${swipeLine(file.path)}</p>
                <div class="facts">
                    ${swipeLine(`folder: ${folder} ${ext || 'no extension'} ${formatBytes(file.size)}`)}
                </div>
                <div class="actions">
                    <a class="btn primary" href="${href}" target="_blank" rel="noopener noreferrer">Open File</a>
                </div>
            `;

            return article;
        }

        function createProjectCard(project, index) {
            const article = document.createElement('article');
            article.className = 'card project-card';
            article.style.animationDelay = `${Math.min(index * 45, 450)}ms`;

            const typeKeys = project.typeKeys || getTypeKeys(project.files);
            const tags = [
                project.name,
                project.path,
                project.folder,
                'project',
                ...project.files.flatMap((file) => [file.name, file.path, file.ext || 'none'])
            ].join(' ').toLowerCase();

            article.dataset.tags = tags;
            article.dataset.folder = project.folder;
            article.dataset.type = 'folder';
            article.dataset.types = typeKeys.join(' ');
            article.innerHTML = `
                <span class="card-type">Folder</span>
                <h2>${swipeLine(project.name)}</h2>
                <p class="path">${swipeLine(`${project.files.length} file${project.files.length === 1 ? '' : 's'} in ${project.path}`)}</p>
                <div class="facts">
                    ${swipeLine(`folder: ${project.folder} ${formatBytes(project.size)}`)}
                </div>
                <div class="actions">
                    <button class="btn primary" type="button">Open Folder</button>
                </div>
            `;
            article.querySelector('button').addEventListener('click', () => openProjectModal(project));

            return article;
        }

        function renderProjectModalFiles(project, query = '') {
            const normalizedQuery = query.toLowerCase().trim();
            const files = project.files.filter((file) => {
                const label = getProjectFileLabel(project, file);
                const tags = `${label} ${file.name} ${file.path} ${file.ext || 'none'}`.toLowerCase();
                return tags.includes(normalizedQuery);
            });

            if (files.length === 0) {
                projectModalFiles.innerHTML = '<p class="modal-empty">No files match this filter.</p>';
                return;
            }

            projectModalFiles.innerHTML = files.map((file) => {
                const label = getProjectFileLabel(project, file);
                return `
                    <a class="modal-file" href="${pathToHref(file.path)}" target="_blank" rel="noopener noreferrer">
                        <span class="modal-file-name">${escapeHtml(label)}</span>
                        <span class="modal-file-ext">${escapeHtml(file.ext || 'file')}</span>
                        <span class="modal-file-size">${formatBytes(file.size)}</span>
                    </a>
                `;
            }).join('');
        }

        function openProjectModal(project) {
            activeProject = project;
            projectModalTitle.textContent = project.name;
            projectModalMeta.textContent = `${project.files.length} file${project.files.length === 1 ? '' : 's'} in ${project.path} - ${formatBytes(project.size)}`;
            projectModalSearch.value = '';
            renderProjectModalFiles(project);
            projectModal.classList.add('open');
            projectModal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            projectModalSearch.focus();
        }

        function closeProjectModal() {
            activeProject = null;
            projectModal.classList.remove('open');
            projectModal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        function refreshSwipingText(scope = document) {
            scope.querySelectorAll('.swipe-line').forEach((line) => {
                const text = line.querySelector('.swipe-text');
                if (!text) return;

                line.classList.remove('is-overflowing');
                line.style.removeProperty('--swipe-distance');
                line.style.removeProperty('--swipe-duration');

                const distance = Math.ceil(text.scrollWidth - line.clientWidth);
                if (distance <= 2) return;

                line.style.setProperty('--swipe-distance', `${distance}px`);
                line.style.setProperty('--swipe-duration', `${Math.min(Math.max(distance / 18, 5), 12)}s`);
                line.classList.add('is-overflowing');
            });
        }

        function updateFilter() {
            const query = search.value.toLowerCase().trim();
            const selectedFolder = folderFilter.value;
            let visible = 0;

            cards.forEach((card) => {
                const queryMatch = card.dataset.tags.includes(query);
                const folderMatch = selectedFolder === 'all' || card.dataset.folder === selectedFolder;
                const typeMatch = selectedType === 'all' || (card.dataset.types || card.dataset.type || '').split(' ').includes(selectedType);
                const show = queryMatch && folderMatch && typeMatch;
                card.classList.toggle('hidden', !show);
                if (show) visible += 1;
            });

            count.textContent = `${visible} card${visible === 1 ? '' : 's'} visible`;
            if (visible === 0) {
                status.style.display = 'block';
                status.textContent = 'No matches found. Try a different filter.';
            } else if (status.dataset.mode === 'filter') {
                status.style.display = 'none';
            }
            status.dataset.mode = visible === 0 ? 'filter' : '';
            requestAnimationFrame(() => refreshSwipingText(cardsRoot));
        }

        function sortFiles(files, mode) {
            return [...files].sort((a, b) => {
                if (mode === 'name-asc') {
                    return a.name.localeCompare(b.name);
                }

                if (mode === 'date-desc') {
                    return new Date(b.modified).getTime() - new Date(a.modified).getTime();
                }

                if (mode === 'size-desc') {
                    return (b.size || 0) - (a.size || 0);
                }

                if (mode === 'type-asc') {
                    const extA = (a.ext || '').toLowerCase();
                    const extB = (b.ext || '').toLowerCase();
                    if (extA !== extB) return extA.localeCompare(extB);
                    return a.path.localeCompare(b.path);
                }

                const folderA = (a.folder || 'root').toLowerCase();
                const folderB = (b.folder || 'root').toLowerCase();
                if (folderA !== folderB) return folderA.localeCompare(folderB);
                const extA = (a.ext || '').toLowerCase();
                const extB = (b.ext || '').toLowerCase();
                if (extA !== extB) return extA.localeCompare(extB);
                return a.path.localeCompare(b.path);
            });
        }

        function hydrateTypeChips(files) {
            const typeSet = new Set(files.map((file) => ((file.ext || '').toLowerCase() || 'none')));
            const preferred = ['all', 'html', 'css', 'js', 'mjs', 'json', 'md', 'svg', 'none'];
            const dynamic = [...typeSet].sort((a, b) => a.localeCompare(b));
            const order = [...new Set([...preferred, ...dynamic])];

            typeChips.innerHTML = '';
            order.forEach((type) => {
                if (type !== 'all' && !typeSet.has(type)) return;

                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = `chip${type === selectedType ? ' active' : ''}`;
                chip.dataset.type = type;
                chip.textContent = type === 'none' ? 'NO EXT' : type.toUpperCase();
                chip.addEventListener('click', () => {
                    selectedType = type;
                    document.querySelectorAll('.chip').forEach((node) => node.classList.remove('active'));
                    chip.classList.add('active');
                    updateFilter();
                });
                typeChips.appendChild(chip);
            });
        }

        function renderCards() {
            const sorted = sortFiles(cardItems, sortFilter.value);
            cardsRoot.innerHTML = '';
            cards = sorted.map((file, index) => createCard(file, index));
            cards.forEach((card) => cardsRoot.appendChild(card));
            updateFilter();
        }

        function hydrateFolderFilter(files) {
            const folderSet = new Set(files.map((file) => file.folder || 'root'));
            const folders = [...folderSet].sort((a, b) => a.localeCompare(b));

            folderFilter.innerHTML = '<option value="all">All folders</option>';
            folders.forEach((folder) => {
                const option = document.createElement('option');
                option.value = folder;
                option.textContent = folder;
                folderFilter.appendChild(option);
            });
        }

        async function loadManifest() {
            try {
                const response = await fetch('files.json', { cache: 'no-store' });
                if (!response.ok) throw new Error('manifest not found');
                const manifest = await response.json();
                loadedFiles = (manifest.files || []).filter((f) => f.path !== 'files.json');
                cardItems = groupFilesIntoCards(loadedFiles);

                hydrateFolderFilter(cardItems);
                hydrateTypeChips(loadedFiles);
                renderCards();

                search.addEventListener('input', updateFilter);
                folderFilter.addEventListener('change', updateFilter);
                sortFilter.addEventListener('change', renderCards);

            } catch (error) {
                status.style.display = 'block';
                status.textContent = 'Could not load files.json. Run node build-files-manifest.mjs to generate it.';
                count.textContent = '0 items visible';
            }
        }

        projectModalClose.addEventListener('click', closeProjectModal);
        projectModal.addEventListener('click', (event) => {
            if (event.target === projectModal) closeProjectModal();
        });
        projectModalSearch.addEventListener('input', () => {
            if (activeProject) renderProjectModalFiles(activeProject, projectModalSearch.value);
        });
        window.addEventListener('resize', () => refreshSwipingText(cardsRoot));
        if (document.fonts) {
            document.fonts.ready.then(() => refreshSwipingText(cardsRoot));
        }
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && projectModal.classList.contains('open')) {
                closeProjectModal();
            }
        });

        loadManifest();
    </script>
</body>
</html>
